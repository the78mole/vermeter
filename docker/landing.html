<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Manager – Start</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1e293b;
    }

    .card {
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3.5rem;
      height: 3.5rem;
      background: #2563eb;
      border-radius: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .logo svg { color: #fff; }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9375rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
      width: 100%;
      padding: 0.8125rem 1.25rem;
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      margin-bottom: 0.875rem;
    }
    .btn-primary:hover { background: #1d4ed8; box-shadow: 0 2px 8px rgba(37,99,235,.35); }

    .btn-secondary {
      background: #f8fafc;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #f1f5f9; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.875rem;
      color: #94a3b8;
      font-size: 0.8125rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8125rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- Building2 icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <building />
        <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
        <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
        <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
        <path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>
      </svg>
    </div>

    <h1>Rental Manager</h1>
    <p>Plattform für die Verwaltung von Immobilien, Mietverhältnissen und Nebenkostenabrechnungen.</p>

    <a class="btn btn-primary" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Zur Anwendung
    </a>

    <div class="divider">Administration</div>

    <a class="btn btn-secondary" href="/auth/admin/" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Keycloak Admin Console
    </a>
  </div>

  <footer>Rental Manager &middot; Intern</footer>
</body>
</html>
