# ──────────────────────────────────────────────────────────────────────────────
# Rental Manager – Docker Compose
#
# Start the full stack:
#   docker compose up -d
#
# Social Login Setup (Google / GitHub):
#   1. Create OAuth 2.0 credentials in the respective developer consoles.
#   2. Set GOOGLE_CLIENT_ID/SECRET and GITHUB_CLIENT_ID/SECRET in .env.
#   3. Log in to Keycloak Admin UI at http://localhost:8081 (admin / admin_secret).
#   4. Enable the "google" and "github" Identity Providers in realm "rental".
# ──────────────────────────────────────────────────────────────────────────────

services:
  caddy:
    build:
      context: ./docker
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - caddy_data:/data
    depends_on:
      - api
      - web
      - keycloak
    networks:
      - proxy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rental_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  keycloak:
    build:
      context: .
      dockerfile: docker/Dockerfile.keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-rental}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-rental_secret}
      KC_HTTP_PORT: 8080
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Social providers – set credentials to enable Google / GitHub login
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - proxy
      - backend

  step-ca:
    image: smallstep/step-ca:latest
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: "Rental Manager CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_ACME: "true"
      # CA password – change in .env for production
      DOCKER_STEPCA_INIT_PASSWORD: ${STEPCA_PASSWORD:-StepCA_Dev_Secret_2024!}
    volumes:
      - step_ca_data:/home/step
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O /dev/null https://localhost:9000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - backend

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rental}:${POSTGRES_PASSWORD:-rental_secret}@db:5432/${POSTGRES_DB:-rental_manager}
      REDIS_URL: redis://redis:6379/0
      # OIDC – internal Docker URL for JWKS validation
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-rental}
      # Service account for Keycloak Admin API (user provisioning)
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-rental-backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-backend_service_secret}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # S3-compatible storage (RustFS)
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://rustfs:9000}
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfs_secret}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS:-landlord-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - proxy
      - backend
    volumes:
      - uploads_data:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info -Q default,billing
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rental}:${POSTGRES_PASSWORD:-rental_secret}@db:5432/${POSTGRES_DB:-rental_manager}
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-rental}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-rental-backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-backend_service_secret}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - uploads_data:/app/uploads

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rental}:${POSTGRES_PASSWORD:-rental_secret}@db:5432/${POSTGRES_DB:-rental_manager}
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-rental}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfs_secret}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs_data:/data
    healthcheck:
      # RustFS antwortet mit 403 auf nicht-authentifizierte Requests – das zeigt, der Server läuft
      test: ["CMD-SHELL", "wget -qS -O /dev/null http://localhost:9000/ 2>&1 | grep -qE 'HTTP/[0-9.]+ [24]' && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
      - proxy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-rental}
        VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-rental-frontend}
    restart: unless-stopped
    networks:
      - proxy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  step_ca_data:
  rustfs_data:

networks:
  proxy:
    driver: bridge
  backend:
    driver: bridge

