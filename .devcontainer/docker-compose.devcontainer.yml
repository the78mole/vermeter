# ──────────────────────────────────────────────────────────────────────────────
# Infrastructure-only Compose file for the devcontainer / Codespaces.
#
# This file starts ONLY the infrastructure services (Postgres, Redis, Keycloak).
# The backend and frontend run directly inside the devcontainer for hot-reload.
#
# Ports are bound to 127.0.0.1 so they are reachable on the devcontainer's
# localhost; the devcontainer.json forwardPorts section exposes the relevant
# ones to Codespaces / the local machine.
# ──────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rental_manager}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres-init.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-rental}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-rental_secret}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      # Exposed on all interfaces so Codespaces can forward it to the browser.
      - "8081:8080"
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
